<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Category — Alamin Network</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Source+Serif+4:opsz,wght@8..60,300;8..60,400;8..60,600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/main.css" />
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <div class="header-top">
        <div class="live-ticker">
          <span class="ticker-label">LIVE</span>
          <span class="ticker-text" id="ticker-text">Loading…</span>
        </div>
        <div class="header-meta">
          <span id="live-date"></span>
          <span class="dot-sep">·</span>
          <span>Dhaka, Bangladesh</span>
        </div>
      </div>
      <div class="header-brand">
        <a href="index.html" class="brand-logo">
          <span class="brand-main">Alamin</span>
          <span class="brand-sub">Network</span>
        </a>
        <p class="brand-tagline">Reporting the World With Precision</p>
      </div>
      <nav class="main-nav">
        <a href="index.html" class="nav-link">Home</a>
        <a href="category.html?cat=national" class="nav-link" data-cat="national">National</a>
        <a href="category.html?cat=international" class="nav-link" data-cat="international">International</a>
        <a href="category.html?cat=sports" class="nav-link" data-cat="sports">Sports</a>
        <button class="search-btn" onclick="toggleSearch()" aria-label="Search">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        </button>
      </nav>
    </div>
    <div class="search-bar" id="searchBar">
      <div class="search-inner">
        <input type="text" id="searchInput" placeholder="Search articles…" oninput="doSearch(this.value)" />
        <button onclick="toggleSearch()">✕</button>
      </div>
      <div id="searchResults" class="search-results"></div>
    </div>
  </header>

  <main class="main-content">
    <section class="category-page-header" id="cat-page-header">
      <div class="cat-label-large" id="cat-label-large"></div>
      <h1 class="cat-page-title" id="cat-page-title"></h1>
      <div class="cat-divider"></div>
    </section>

    <section class="feed-section">
      <div class="news-list" id="cat-list"></div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-brand">
        <span class="brand-main">Alamin</span><span class="brand-sub">Network</span>
      </div>
      <p class="footer-tagline">© 2026 Alamin Network. All rights reserved.</p>
      <nav class="footer-nav">
        <a href="category.html?cat=national">National</a>
        <a href="category.html?cat=international">International</a>
        <a href="category.html?cat=sports">Sports</a>
      </nav>
    </div>
  </footer>

  <script src="js/main.js"></script>
  <script>
    initCategoryPage();
  </script>
</body>
</html>
