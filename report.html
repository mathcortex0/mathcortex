<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Article — Alamin Network</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Source+Serif+4:opsz,wght@8..60,300;8..60,400;8..60,600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/main.css" />
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <div class="header-top">
        <div class="live-ticker">
          <span class="ticker-label">LIVE</span>
          <span class="ticker-text" id="ticker-text">Loading…</span>
        </div>
        <div class="header-meta">
          <span id="live-date"></span>
          <span class="dot-sep">·</span>
          <span>Dhaka, Bangladesh</span>
        </div>
      </div>
      <div class="header-brand">
        <a href="index.html" class="brand-logo">
          <span class="brand-main">Alamin</span>
          <span class="brand-sub">Network</span>
        </a>
        <p class="brand-tagline">Reporting the World With Precision</p>
      </div>
      <nav class="main-nav">
        <a href="index.html" class="nav-link">Home</a>
        <a href="category.html?cat=national" class="nav-link">National</a>
        <a href="category.html?cat=international" class="nav-link">International</a>
        <a href="category.html?cat=sports" class="nav-link">Sports</a>
        <button class="search-btn" onclick="toggleSearch()" aria-label="Search">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        </button>
      </nav>
    </div>
    <div class="search-bar" id="searchBar">
      <div class="search-inner">
        <input type="text" id="searchInput" placeholder="Search articles…" oninput="doSearch(this.value)" />
        <button onclick="toggleSearch()">✕</button>
      </div>
      <div id="searchResults" class="search-results"></div>
    </div>
  </header>

  <main class="main-content">
    <div class="article-layout">

      <!-- Article Body -->
      <article class="article-body" id="article-body">
        <div class="article-skeleton">
          <div class="sk-line sk-cat"></div>
          <div class="sk-line sk-h1"></div>
          <div class="sk-line sk-h1 short"></div>
          <div class="sk-line sk-meta"></div>
          <div class="sk-divider"></div>
          <div class="sk-line sk-p"></div>
          <div class="sk-line sk-p"></div>
          <div class="sk-line sk-p short"></div>
        </div>
      </article>

      <!-- Sidebar -->
      <aside class="article-sidebar">
        <div class="sidebar-section">
          <h4 class="sidebar-title">More Stories</h4>
          <div id="related-list"></div>
        </div>
        <div class="sidebar-section share-section">
          <h4 class="sidebar-title">Share</h4>
          <div class="share-buttons">
            <button class="share-btn" onclick="shareTo('twitter')">𝕏 Twitter</button>
            <button class="share-btn" onclick="shareTo('facebook')">Facebook</button>
            <button class="share-btn" onclick="copyLink()">Copy Link</button>
            <button class="share-btn download-btn" onclick="downloadSummary()" id="download-btn">↓ Download Summary</button>
          </div>
        </div>
      </aside>

    </div>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-brand">
        <span class="brand-main">Alamin</span><span class="brand-sub">Network</span>
      </div>
      <p class="footer-tagline">© 2026 Alamin Network. All rights reserved.</p>
      <nav class="footer-nav">
        <a href="category.html?cat=national">National</a>
        <a href="category.html?cat=international">International</a>
        <a href="category.html?cat=sports">Sports</a>
      </nav>
    </div>
  </footer>

  <!-- Hidden canvas for PNG download -->
  <canvas id="summary-canvas" style="display:none"></canvas>

  <script src="js/main.js"></script>
  <script>
    initArticlePage();
  </script>
</body>
</html>
